name: Quant Research CI

on:
  push:
    paths:
      - 'research/quant/**'
  pull_request:
    paths:
      - 'research/quant/**'

jobs:
  validate-framework:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research/quant

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "research/quant/.python-version"
          
      - name: Install dependencies
        run: uv sync
        
      - name: Run PyTest (Leakage, Golden Dataset, E2E)
        run: uv run pytest tests/
        
      - name: Verify Experiment Quality Gate (E2E Smoke Test)
        run: uv run python experiments/exp_001_calibration.py
        
      - name: Upload Experiment Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exp_001_artifacts
          path: |
            research/quant/exp_001_artifacts/
            research/quant/manifest.json
